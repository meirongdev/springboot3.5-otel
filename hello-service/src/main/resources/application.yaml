spring:
  application:
    name: hello-service
  config:
    import:
      - "optional:classpath:application-otel.yaml"
      - "optional:classpath:application-kafka.yaml"

server:
  port: 8080

user:
  service:
    url: http://localhost:8081

greeting:
  service:
    url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
