name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Spotless Check
        run: ./gradlew spotlessCheck --no-daemon --console=plain

      - name: Build and run tests
        run: ./gradlew clean build --no-daemon --console=plain

      - name: Publish stubs to local Maven
        run: ./gradlew :greeting-service:publishStubsToMavenLocal :user-service:publishStubsToMavenLocal

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/**'

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/test-results/**'
