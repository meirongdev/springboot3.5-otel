services:
  grafana-otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: grafana-otel-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - lgtm-data:/var/lib/grafana
      - ./grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/custom
      - ./grafana/provisioning/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml
      - ./grafana/provisioning/disable-defaults.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
    volumes:
      - ./grafana/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "13133:13133"
    depends_on:
      grafana-otel-lgtm:
        condition: service_healthy

  hello-service:
    build:
      context: .
      dockerfile: hello-service/Dockerfile
    container_name: hello-service
    ports:
      - "8080:18080"
    environment:
      # Service discovery
      - USER_SERVICE_URL=http://user-service:18081
      - GREETING_SERVICE_URL=http://greeting-service:18082
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # OpenTelemetry
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://otel-collector:4318/v1/metrics
      - MANAGEMENT_OTLP_LOGGING_ENDPOINT=http://otel-collector:4318/v1/logs
      - OTEL_SERVICE_NAMESPACE=springboot3.5-otel
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
      - OTEL_TRACING_SAMPLING_PROBABILITY=1.0
      # JFR Profiling (JDK_JAVA_OPTIONS)
      - JDK_JAVA_OPTIONS=-XX:StartFlightRecording=name=production,maxsize=200m,maxage=2h,settings=profile -XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xlog:gc*:file=/logs/gc.log:time,uptime:filecount=5,filesize=10M -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/logs/
      # Actuator
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics,threaddump
      - SPRING_APPLICATION_NAME=hello-service
    volumes:
      - ./logs/hello-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:18080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      otel-collector:
        condition: service_started
      user-service:
        condition: service_healthy
      greeting-service:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "8081:18081"
    environment:
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # OpenTelemetry
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://otel-collector:4318/v1/metrics
      - MANAGEMENT_OTLP_LOGGING_ENDPOINT=http://otel-collector:4318/v1/logs
      - OTEL_SERVICE_NAMESPACE=springboot3.5-otel
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
      - OTEL_TRACING_SAMPLING_PROBABILITY=1.0
      # JFR Profiling (JDK_JAVA_OPTIONS)
      - JDK_JAVA_OPTIONS=-XX:StartFlightRecording=name=production,maxsize=200m,maxage=2h,settings=profile -XX:MaxRAMPercentage=75 -XX:+UseG1GC -Xlog:gc*:file=/logs/gc.log:time,uptime:filecount=5,filesize=10M
      # Actuator
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics,threaddump
      - SPRING_APPLICATION_NAME=user-service
    volumes:
      - ./logs/user-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:18081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      otel-collector:
        condition: service_started

  greeting-service:
    build:
      context: .
      dockerfile: greeting-service/Dockerfile
    container_name: greeting-service
    ports:
      - "8082:18082"
    environment:
      # OpenTelemetry
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://otel-collector:4318/v1/metrics
      - MANAGEMENT_OTLP_LOGGING_ENDPOINT=http://otel-collector:4318/v1/logs
      - OTEL_SERVICE_NAMESPACE=springboot3.5-otel
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
      - OTEL_TRACING_SAMPLING_PROBABILITY=1.0
      # Redis
      - REDIS_HOST=redis
      # JFR Profiling (JDK_JAVA_OPTIONS)
      - JDK_JAVA_OPTIONS=-XX:StartFlightRecording=name=production,maxsize=200m,maxage=2h,settings=profile -XX:MaxRAMPercentage=75 -XX:+UseG1GC -Xlog:gc*:file=/logs/gc.log:time,uptime:filecount=5,filesize=10M
      # Actuator
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics,threaddump
      - SPRING_APPLICATION_NAME=greeting-service
    volumes:
      - ./logs/greeting-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:18082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      otel-collector:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  lgtm-data:
