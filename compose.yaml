services:
  grafana-otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - lgtm-data:/var/lib/grafana
      - ./grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/custom
      - ./grafana/provisioning/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml
      - ./grafana/provisioning/disable-defaults.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
    volumes:
      - ./grafana/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    expose:
      - "13133"
    depends_on:
      grafana-otel-lgtm:
        condition: service_healthy

  hello-service:
    build:
      context: .
      dockerfile: hello-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Service discovery
      - USER_SERVICE_URL=http://user-service:8081
      - GREETING_SERVICE_URL=http://greeting-service:8082
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # OpenTelemetry
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://otel-collector:4318/v1/metrics
      - MANAGEMENT_OTLP_LOGGING_ENDPOINT=http://otel-collector:4318/v1/logs
      - OTEL_SERVICE_NAMESPACE=springboot3.5-otel
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
      - OTEL_TRACING_SAMPLING_PROBABILITY=1.0
      # JFR Profiling (JDK_JAVA_OPTIONS)
      - JDK_JAVA_OPTIONS=-XX:StartFlightRecording=name=production,maxsize=200m,maxage=2h,settings=profile -XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xlog:gc*:file=/logs/gc.log:time,uptime:filecount=5,filesize=10M -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/logs/
      # Actuator
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics,threaddump
      - SPRING_APPLICATION_NAME=hello-service
    volumes:
      - ./logs/hello-service:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      otel-collector:
        condition: service_started
      user-service:
        condition: service_healthy
      greeting-service:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # OpenTelemetry
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://otel-collector:4318/v1/metrics
      - MANAGEMENT_OTLP_LOGGING_ENDPOINT=http://otel-collector:4318/v1/logs
      - OTEL_SERVICE_NAMESPACE=springboot3.5-otel
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
      - OTEL_TRACING_SAMPLING_PROBABILITY=1.0
      # JFR Profiling (JDK_JAVA_OPTIONS)
      - JDK_JAVA_OPTIONS=-XX:StartFlightRecording=name=production,maxsize=200m,maxage=2h,settings=profile -XX:MaxRAMPercentage=75 -XX:+UseG1GC -Xlog:gc*:file=/logs/gc.log:time,uptime:filecount=5,filesize=10M
      # Actuator
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics,threaddump
      - SPRING_APPLICATION_NAME=user-service
    volumes:
      - ./logs/user-service:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      otel-collector:
        condition: service_started

  greeting-service:
    build:
      context: .
      dockerfile: greeting-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      # OpenTelemetry
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://otel-collector:4318/v1/metrics
      - MANAGEMENT_OTLP_LOGGING_ENDPOINT=http://otel-collector:4318/v1/logs
      - OTEL_SERVICE_NAMESPACE=springboot3.5-otel
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=docker-compose
      - OTEL_TRACING_SAMPLING_PROBABILITY=1.0
      # JFR Profiling (JDK_JAVA_OPTIONS)
      - JDK_JAVA_OPTIONS=-XX:StartFlightRecording=name=production,maxsize=200m,maxage=2h,settings=profile -XX:MaxRAMPercentage=75 -XX:+UseG1GC -Xlog:gc*:file=/logs/gc.log:time,uptime:filecount=5,filesize=10M
      # Actuator
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics,threaddump
      - SPRING_APPLICATION_NAME=greeting-service
    volumes:
      - ./logs/greeting-service:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      otel-collector:
        condition: service_started
      kafka:
        condition: service_healthy

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9093", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  lgtm-data:
